<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
<defs>
  <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
    <stop offset="0%" style="stop-color:#1a5276"/>
    <stop offset="100%" style="stop-color:#2980b9"/>
  </linearGradient>
</defs>
<rect width="512" height="512" rx="96" fill="url(#bg)"/>
<!-- Estilización de tiroides (mariposa) -->
<g transform="translate(256,220)" fill="white" opacity="0.95">
  <!-- Lóbulo izquierdo -->
  <path d="M-10,0 C-30,-40 -80,-60 -100,-30 C-120,0 -90,40 -60,50 C-30,60 -15,30 -10,0Z" opacity="0.9"/>
  <!-- Lóbulo derecho -->
  <path d="M10,0 C30,-40 80,-60 100,-30 C120,0 90,40 60,50 C30,60 15,30 10,0Z" opacity="0.9"/>
  <!-- Istmo -->
  <rect x="-18" y="-5" width="36" height="18" rx="6" opacity="0.85"/>
  <!-- Símbolo médico cruz -->
  <g transform="translate(0, 110)">
    <circle cx="0" cy="0" r="30" fill="none" stroke="white" stroke-width="6" opacity="0.7"/>
    <line x1="-15" y1="0" x2="15" y2="0" stroke="white" stroke-width="5" stroke-linecap="round" opacity="0.7"/>
    <line x1="0" y1="-15" x2="0" y2="15" stroke="white" stroke-width="5" stroke-linecap="round" opacity="0.7"/>
  </g>
</g>
</svg>